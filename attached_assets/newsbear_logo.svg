<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Bear head -->
  <circle cx="60" cy="45" r="35" fill="#D2691E" stroke="#8B4513" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Ears -->
  <circle cx="35" cy="25" r="12" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
  <circle cx="85" cy="25" r="12" fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
  <circle cx="35" cy="25" r="7" fill="#CD853F"/>
  <circle cx="85" cy="25" r="7" fill="#CD853F"/>
  
  <!-- Eyes -->
  <circle cx="50" cy="40" r="4" fill="#000"/>
  <circle cx="70" cy="40" r="4" fill="#000"/>
  
  <!-- Nose -->
  <ellipse cx="60" cy="50" rx="3" ry="2" fill="#000"/>
  
  <!-- Mouth -->
  <path d="M 55 55 Q 60 60 65 55" stroke="#000" stroke-width="2" fill="none"/>
  
  <!-- Newspaper -->
  <rect x="25" y="65" width="70" height="50" fill="#F5F5DC" stroke="#8B4513" stroke-width="2" rx="3" filter="url(#shadow)"/>
  
  <!-- Newspaper content -->
  <rect x="30" y="70" width="25" height="15" fill="#DDD"/>
  <line x1="60" y1="72" x2="85" y2="72" stroke="#666" stroke-width="1"/>
  <line x1="60" y1="76" x2="85" y2="76" stroke="#666" stroke-width="1"/>
  <line x1="60" y1="80" x2="85" y2="80" stroke="#666" stroke-width="1"/>
  
  <text x="65" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">NEWS</text>
  
  <rect x="30" y="95" width="15" height="10" fill="#DDD"/>
  <rect x="50" y="95" width="15" height="10" fill="#DDD"/>
  <line x1="30" y1="108" x2="85" y2="108" stroke="#666" stroke-width="1"/>
</svg>